name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'
      
      - name: Show project structure
        run: |
          echo "=== Project root ==="
          ls -la
          echo "=== app folder ==="
          ls -la app/ || echo "no app folder"
      
      - name: Generate Gradle wrapper if missing
        run: |
          if [ ! -f gradlew ]; then
            echo "No gradlew, generating wrapper..."
            gradle wrapper --gradle-version 8.5
          fi
          chmod +x gradlew
      
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
      
      - name: List built APKs
        if: always()
        run: |
          echo "=== Looking for APKs ==="
          find . -name "*.apk" 2>/dev/null || echo "no apks found"
      
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: professors-cinema-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
      
      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            app/build/outputs/logs/
            *.log
          if-no-files-found: ignore
